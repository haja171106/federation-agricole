openapi: 3.1.0
info:
  title: Agricultural Federation API
  description: |
    # Versioning
    This API uses semantic versioning (MAJOR.MINOR.PATCH). Available versions are :
    - v0.0.1 (2026-04-21) : POST /collectivities for collectivities creation and POST /members for members creation.
    - v0.0.2 (2026-04-21) : Full CRUD on collectivities, members, mandates, contributions, accounts, activities, attendances and statistics.
    - v0.0.3 (2026-04-22) : PATCH /collectivities/{id}/identity — federation assigns a unique number and name to a collectivity (feature J). Once set, neither field can be changed.
  version: 0.0.3

servers:
  - url: http://localhost:8080

tags:
  - name: Collectivities
  - name: Members
  - name: Mandates
  - name: Contributions
  - name: Accounts
  - name: Activities
  - name: Attendances
  - name: Statistics
  - name: Federation

paths:

  /collectivities:
    get:
      tags: [Collectivities]
      summary: List collectivities
      operationId: listCollectivities
      parameters:
        - {name: location, in: query, schema: {type: string}}
        - {name: specialty, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageCollectivity'}}}}

    post:
      tags: [Collectivities]
      summary: Create list of collectivities
      description: |
        During collectivity request body creation, only members ID are provided to identify members.
        But the response content includes members information, not only their IDs.
      operationId: createCollectivities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCollectivity'
      responses:
        '201':
          description: List of created collectivities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'
        '400':
          description: Collectivity without federation approval or structure missing.
        '404':
          description: Member not found.

  /collectivities/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Collectivities]
      summary: Get a collectivity
      operationId: getCollectivity
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Collectivities]
      summary: Update a collectivity
      operationId: updateCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateCollectivity'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/approval:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [Collectivities]
      summary: Grant or deny federation approval
      operationId: approveCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ApprovalRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/identity:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [Collectivities]
      summary: Assign a unique number and name to a collectivity (feature J)
      description: |
        This endpoint is reserved for the federation.
        - The system checks that the name is not already taken by another collectivity.
        - Once a number or a name has been assigned, it cannot be changed.
          Any attempt to overwrite an already-set value returns **409 Conflict**.
      operationId: assignCollectivityIdentity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AssignIdentityRequest'}
      responses:
        '200':
          description: Identity assigned — returns the updated collectivity.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Collectivity'}
        '400':
          description: Request body is missing both number and name.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /members:
    post:
      tags: [Members]
      summary: Create list of members
      description: |
        The following cases must return a bad request exception :
        - Member with bad referees or without proper payment.
        - Membership dues not paid or registration fee not paid.
      operationId: createMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
      responses:
        '201':
          description: List of created members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '400':
          description: |
            The following cases must return a bad request exception :
            - Member with bad referees or without proper payment.
            - Membership dues not paid or registration fee not paid.
        '404':
          description: Either collectivity or member not found.

  /collectivities/{id}/members:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Members]
      summary: List members of a collectivity
      operationId: listMembers
      parameters:
        - {name: occupation, in: query, schema: {$ref: '#/components/schemas/MemberOccupation'}}
        - {name: active, in: query, schema: {type: boolean}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageMember'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/members/{memberId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: memberId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Members]
      summary: Get a member
      operationId: getMember
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Member'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Members]
      summary: Resign a member
      operationId: resignMember
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ResignRequest'}
      responses:
        '204': {description: Resignation registered}
        '404': {$ref: '#/components/responses/NotFound'}

  /members/{memberId}/transfer:
    parameters:
      - {name: memberId, in: path, required: true, schema: {type: string}}
    post:
      tags: [Members]
      summary: Transfer a member to another collectivity
      operationId: transferMember
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TransferRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Member'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/mandates:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Mandates]
      summary: List mandates of a collectivity
      operationId: listMandates
      parameters:
        - {name: year, in: query, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Mandate'}}}}}
    post:
      tags: [Mandates]
      summary: Create an annual mandate
      operationId: createMandate
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateMandate'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Mandate'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/mandates/{mandateId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: mandateId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Mandates]
      summary: Get a mandate
      operationId: getMandate
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Mandate'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/contributions:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Contributions]
      summary: List contributions of a collectivity
      operationId: listContributions
      parameters:
        - {name: memberId, in: query, schema: {type: string}}
        - {name: type, in: query, schema: {$ref: '#/components/schemas/ContributionType'}}
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageContribution'}}}}
    post:
      tags: [Contributions]
      summary: Record a contribution payment
      operationId: recordContribution
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateContribution'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Contribution'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/contributions/{contributionId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: contributionId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Contributions]
      summary: Get a contribution
      operationId: getContribution
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Contribution'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/accounts:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Accounts]
      summary: List accounts of a collectivity
      operationId: listAccountsCollectivity
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/AccountType'}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Account'}}}}}
    post:
      tags: [Accounts]
      summary: Create an account
      operationId: createAccountCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAccount'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: accountId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Accounts]
      summary: Get an account
      operationId: getAccountCollectivity
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Accounts]
      summary: Update account balance
      operationId: updateAccountCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateAccountBalance'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation/accounts:
    get:
      tags: [Federation]
      summary: List federation accounts
      operationId: listAccountsFederation
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/AccountType'}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Account'}}}}}
    post:
      tags: [Federation]
      summary: Create a federation account
      operationId: createAccountFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAccount'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/accounts/{accountId}:
    parameters:
      - {name: accountId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Federation]
      summary: Get a federation account
      operationId: getAccountFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Federation]
      summary: Update federation account balance
      operationId: updateAccountFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateAccountBalance'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/schedule:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Activities]
      summary: Get annual schedule
      operationId: getSchedule
      parameters:
        - {name: year, in: query, required: true, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Schedule'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Activities]
      summary: Define recurrence rules
      operationId: setSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateSchedule'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Schedule'}}}}

  /collectivities/{id}/activities:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Activities]
      summary: List activities of a collectivity
      operationId: listActivities
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/ActivityType'}}
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageActivity'}}}}
    post:
      tags: [Activities]
      summary: Plan an exceptional activity
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateActivity'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/activities/{activityId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: activityId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Activities]
      summary: Get an activity
      operationId: getActivity
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Activities]
      summary: Update an activity
      operationId: updateActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateActivity'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Activities]
      summary: Delete an activity
      operationId: deleteActivity
      responses:
        '204': {description: Deleted}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation/activities:
    get:
      tags: [Federation]
      summary: List federation activities
      operationId: listFederationActivities
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageActivity'}}}}
    post:
      tags: [Federation]
      summary: Plan a national activity
      operationId: createFederationActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateFederationActivity'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/activities/{activityId}:
    parameters:
      - {name: activityId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Federation]
      summary: Get a federation activity
      operationId: getFederationActivity
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Federation]
      summary: Update a federation activity
      operationId: updateFederationActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateFederationActivity'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Federation]
      summary: Delete a federation activity
      operationId: deleteFederationActivity
      responses:
        '204': {description: Deleted}
        '404': {$ref: '#/components/responses/NotFound'}

  /activities/{activityId}/attendances:
    parameters:
      - {name: activityId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Attendances]
      summary: Get attendance sheet of an activity
      operationId: listAttendances
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Attendance'}}}}}
    post:
      tags: [Attendances]
      summary: Record a member attendance
      operationId: recordAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAttendance'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Attendance'}}}}
        '409': {description: Attendance already recorded}

  /activities/{activityId}/attendances/{memberId}:
    parameters:
      - {name: activityId, in: path, required: true, schema: {type: string}}
      - {name: memberId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Attendances]
      summary: Get attendance of a member
      operationId: getAttendance
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Attendance'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Attendances]
      summary: Update attendance
      operationId: updateAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAttendance'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Attendance'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/statistics:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Statistics]
      summary: Monthly report (for the federation)
      operationId: getMonthlyReport
      parameters:
        - {name: month, in: query, required: true, schema: {type: integer, minimum: 1, maximum: 12}}
        - {name: year, in: query, required: true, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/CollectivityStatistics'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/statistics/members:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Statistics]
      summary: Detailed statistics for all active members
      operationId: getMembersStatistics
      parameters:
        - {name: startDate, in: query, required: true, schema: {type: string, format: date}}
        - {name: endDate, in: query, required: true, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageMemberStatistics'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/statistics/members/{memberId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: memberId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Statistics]
      summary: Statistics of a specific member
      operationId: getMemberStatistics
      parameters:
        - {name: startDate, in: query, required: true, schema: {type: string, format: date}}
        - {name: endDate, in: query, required: true, schema: {type: string, format: date}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/MemberStatistics'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation:
    get:
      tags: [Federation]
      summary: Get federation info
      operationId: getFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Federation'}}}}
    put:
      tags: [Federation]
      summary: Update federation settings
      operationId: updateFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateFederation'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Federation'}}}}

  /federation/mandates:
    get:
      tags: [Federation]
      summary: List federation mandates
      operationId: listFederationMandates
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/FederationMandate'}}}}}
    post:
      tags: [Federation]
      summary: Create a federation mandate (2 years)
      operationId: createFederationMandate
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateFederationMandate'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/FederationMandate'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/mandates/{mandateId}:
    parameters:
      - {name: mandateId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Federation]
      summary: Get a federation mandate
      operationId: getFederationMandate
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/FederationMandate'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

components:

  parameters:
    id:
      name: id
      in: path
      required: true
      schema: {type: string}
    page:
      name: page
      in: query
      schema: {type: integer, default: 1, minimum: 1}
    size:
      name: size
      in: query
      schema: {type: integer, default: 20, minimum: 1, maximum: 100}

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Conflict:
      description: |
        The number or name is already assigned to this collectivity and cannot be changed,
        or the name is already used by another collectivity.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}

  schemas:

    MemberOccupation:
      type: string
      enum: [PRESIDENT, VICE_PRESIDENT, TREASURER, SECRETARY, SENIOR, JUNIOR]

    Gender:
      type: string
      enum: [MALE, FEMALE]

    AccountType:
      type: string
      enum: [CASH, BANK, MOBILE_MONEY]

    ContributionType:
      type: string
      enum: [MONTHLY, ANNUAL, OCCASIONAL]

    PaymentMethod:
      type: string
      enum: [CASH, BANK_TRANSFER, MOBILE_MONEY]

    ActivityType:
      type: string
      enum: [GENERAL_ASSEMBLY, JUNIOR_TRAINING, EXCEPTIONAL, FEDERATION]

    AttendanceStatus:
      type: string
      enum: [PRESENT, ABSENT, EXCUSED]

    Bank:
      type: string
      enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]

    MobileMoneyService:
      type: string
      enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]

    MemberIdentifier:
      type: string

    MemberInformation:
      type: object
      properties:
        firstName: {type: string}
        lastName: {type: string}
        birthDate: {type: string, format: date}
        gender: {$ref: '#/components/schemas/Gender'}
        address: {type: string}
        profession: {type: string}
        phoneNumber: {type: string}
        email: {type: string, format: email}
        occupation: {$ref: '#/components/schemas/MemberOccupation'}

    CreateMember:
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      type: object
      properties:
        collectivityIdentifier: {type: string}
        referees:
          type: array
          items: {$ref: '#/components/schemas/MemberIdentifier'}
        registrationFeePaid: {type: boolean}
        membershipDuesPaid: {type: boolean}

    Member:
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      type: object
      properties:
        id: {$ref: '#/components/schemas/MemberIdentifier'}
        collectivityId: {type: string}
        active: {type: boolean}
        memberSince: {type: string, format: date}
        referees:
          type: array
          items: {$ref: '#/components/schemas/Member'}

    ResignRequest:
      type: object
      required: [resignationDate]
      properties:
        resignationDate: {type: string, format: date}
        reason: {type: string}

    TransferRequest:
      type: object
      required: [targetCollectivityId, transferDate]
      properties:
        targetCollectivityId: {type: string}
        transferDate: {type: string, format: date}
        reason: {type: string}

    MemberIdentifierRef:
      type: object
      properties:
        id: {$ref: '#/components/schemas/MemberIdentifier'}

    CreateCollectivityStructure:
      type: object
      properties:
        president: {$ref: '#/components/schemas/MemberIdentifier'}
        vicePresident: {$ref: '#/components/schemas/MemberIdentifier'}
        treasurer: {$ref: '#/components/schemas/MemberIdentifier'}
        secretary: {$ref: '#/components/schemas/MemberIdentifier'}

    CollectivityStructure:
      type: object
      properties:
        president: {$ref: '#/components/schemas/Member'}
        vicePresident: {$ref: '#/components/schemas/Member'}
        treasurer: {$ref: '#/components/schemas/Member'}
        secretary: {$ref: '#/components/schemas/Member'}

    CreateCollectivity:
      type: object
      properties:
        location: {type: string}
        specialty: {type: string}
        creationDate: {type: string, format: date}
        federationApproval: {type: boolean}
        structure: {$ref: '#/components/schemas/CreateCollectivityStructure'}
        members:
          type: array
          minItems: 10
          items: {$ref: '#/components/schemas/MemberIdentifier'}

    Collectivity:
      type: object
      properties:
        id: {type: string}
        number: {type: string}
        name: {type: string}
        location: {type: string}
        specialty: {type: string}
        creationDate: {type: string, format: date}
        federationApproval: {type: boolean}
        structure: {$ref: '#/components/schemas/CollectivityStructure'}
        members:
          type: array
          items: {$ref: '#/components/schemas/Member'}

    ApprovalRequest:
      type: object
      required: [approved]
      properties:
        approved: {type: boolean}
        comment: {type: string}

    AssignIdentityRequest:
      type: object
      description: |
        At least one of `number` or `name` must be provided.
        Once a field is set on the collectivity, sending it again returns 409 Conflict.
        The `name` must be unique across all collectivities (checked by the system).
      properties:
        number:
          type: string
          description: Unique number assigned by the federation (e.g. "COLL-042").
        name:
          type: string
          description: Unique name assigned by the federation (e.g. "Collectivité Rizicole d'Antananarivo").

    MemberOccupationRef:
      type: object
      required: [memberId, occupation]
      properties:
        memberId: {type: string}
        occupation: {$ref: '#/components/schemas/MemberOccupation'}

    Mandate:
      type: object
      properties:
        id: {type: string}
        collectivityId: {type: string}
        year: {type: integer}
        startDate: {type: string, format: date}
        endDate: {type: string, format: date}
        occupations:
          type: array
          items: {$ref: '#/components/schemas/MemberOccupationRef'}

    CreateMandate:
      type: object
      required: [year, occupations]
      properties:
        year: {type: integer}
        occupations:
          type: array
          minItems: 4
          items: {$ref: '#/components/schemas/MemberOccupationRef'}

    FederationMandate:
      type: object
      properties:
        id: {type: string}
        startDate: {type: string, format: date}
        endDate: {type: string, format: date}
        occupations:
          type: array
          items: {$ref: '#/components/schemas/MemberOccupationRef'}

    CreateFederationMandate:
      type: object
      required: [startDate, occupations]
      properties:
        startDate: {type: string, format: date}
        occupations:
          type: array
          minItems: 4
          items: {$ref: '#/components/schemas/MemberOccupationRef'}

    Contribution:
      type: object
      properties:
        id: {type: string}
        collectivityId: {type: string}
        memberId: {type: string}
        amount: {type: number}
        paymentDate: {type: string, format: date}
        paymentMethod: {$ref: '#/components/schemas/PaymentMethod'}
        type: {$ref: '#/components/schemas/ContributionType'}
        reason: {type: string}
        amountForwardedToFederation: {type: number, readOnly: true}

    CreateContribution:
      type: object
      required: [memberId, amount, paymentDate, paymentMethod, type]
      properties:
        memberId: {type: string}
        amount: {type: number}
        paymentDate: {type: string, format: date}
        paymentMethod: {$ref: '#/components/schemas/PaymentMethod'}
        type: {$ref: '#/components/schemas/ContributionType'}
        reason: {type: string}

    Account:
      type: object
      properties:
        id: {type: string}
        type: {$ref: '#/components/schemas/AccountType'}
        balance: {type: number}
        balanceDate: {type: string, format: date}
        currency: {type: string, default: MGA}
        holder: {type: string}
        bank: {$ref: '#/components/schemas/Bank'}
        accountNumber: {type: string, pattern: '^\d{23}$'}
        mobileMoneyService: {$ref: '#/components/schemas/MobileMoneyService'}
        phoneNumber: {type: string}

    CreateAccount:
      type: object
      required: [type]
      properties:
        type: {$ref: '#/components/schemas/AccountType'}
        initialBalance: {type: number, default: 0}
        holder: {type: string}
        bank: {$ref: '#/components/schemas/Bank'}
        accountNumber: {type: string, pattern: '^\d{23}$'}
        mobileMoneyService: {$ref: '#/components/schemas/MobileMoneyService'}
        phoneNumber: {type: string}

    UpdateAccountBalance:
      type: object
      required: [balance, balanceDate]
      properties:
        balance: {type: number}
        balanceDate: {type: string, format: date}

    Activity:
      type: object
      properties:
        id: {type: string}
        collectivityId: {type: string, nullable: true}
        type: {$ref: '#/components/schemas/ActivityType'}
        title: {type: string}
        description: {type: string}
        date: {type: string, format: date-time}
        mandatory: {type: boolean}
        targetOccupations:
          type: array
          items: {$ref: '#/components/schemas/MemberOccupation'}

    CreateActivity:
      type: object
      required: [title, date, mandatory]
      properties:
        title: {type: string}
        description: {type: string}
        date: {type: string, format: date-time}
        mandatory: {type: boolean}
        targetOccupations:
          type: array
          items: {$ref: '#/components/schemas/MemberOccupation'}

    CreateFederationActivity:
      type: object
      required: [title, date, mandatory]
      properties:
        title: {type: string}
        description: {type: string}
        date: {type: string, format: date-time}
        mandatory: {type: boolean}
        invitedCollectivityIds:
          type: array
          items: {type: string}

    Schedule:
      type: object
      properties:
        collectivityId: {type: string}
        year: {type: integer}
        generalAssemblyRule: {type: string}
        juniorTrainingRule: {type: string}
        generalAssemblyDates:
          type: array
          readOnly: true
          items: {type: string, format: date}
        juniorTrainingDates:
          type: array
          readOnly: true
          items: {type: string, format: date}

    CreateSchedule:
      type: object
      required: [year, generalAssemblyRule, juniorTrainingRule]
      properties:
        year: {type: integer}
        generalAssemblyRule: {type: string}
        juniorTrainingRule: {type: string}

    Attendance:
      type: object
      properties:
        activityId: {type: string}
        memberId: {type: string}
        status: {$ref: '#/components/schemas/AttendanceStatus'}
        isVisitor: {type: boolean, default: false}
        absenceReason: {type: string, nullable: true}

    CreateAttendance:
      type: object
      required: [memberId, status]
      properties:
        memberId: {type: string}
        status: {$ref: '#/components/schemas/AttendanceStatus'}
        absenceReason: {type: string}

    CollectivityStatistics:
      type: object
      properties:
        collectivityId: {type: string}
        month: {type: integer}
        year: {type: integer}
        attendanceRatePercent: {type: number}
        activeMembers: {type: integer}
        activitiesHeld: {type: integer}

    MemberStatistics:
      type: object
      properties:
        memberId: {type: string}
        startDate: {type: string, format: date}
        endDate: {type: string, format: date}
        attendanceRatePercent: {type: number}
        totalPaidMGA: {type: number}
        totalUnpaidMGA: {type: number}

    Federation:
      type: object
      properties:
        id: {type: string}
        name: {type: string}
        contributionForwardingPercent: {type: number}

    UpdateFederation:
      type: object
      required: [contributionForwardingPercent]
      properties:
        contributionForwardingPercent:
          type: number
          minimum: 0
          maximum: 100

    Error:
      type: object
      properties:
        code: {type: string}
        message: {type: string}

    Page:
      type: object
      properties:
        page: {type: integer}
        size: {type: integer}
        totalElements: {type: integer}
        totalPages: {type: integer}

    PageCollectivity:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/Collectivity'}}

    PageMember:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/Member'}}

    PageContribution:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/Contribution'}}

    PageActivity:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/Activity'}}

    PageMemberStatistics:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/MemberStatistics'}}