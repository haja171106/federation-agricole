openapi: 3.1.0
info:
  title: Agricultural Federation API
  description: |
    # Versioning
    - v0.0.1 (2026-04-21) : POST /collectivities, POST /members
    - v0.0.2 (2026-04-21) : Full CRUD collectivities, members, mandates, contributions, accounts, activities, attendances, statistics
    - v0.0.3 (2026-04-22) : PATCH /collectivities/{id}/identity — federation assigns number and name (immutable once set)
    - v0.0.4 (2026-04-27) :
        - PUT /collectivities/{id}/informations replaces PATCH /collectivities/{id}/identity
        - Contribution replaced by MemberPayment (aligned with member_payment table)
        - MembershipFee becomes a first-class entity (membership_fee table)
        - CollectivityTransaction added (collectivity_transaction table)
        - transaction_id exposed on MemberPayment
        - Account balance is now readOnly (computed from transactions)
        - Member creation uses real payment objects instead of boolean flags
        - POST /members/{id}/payments to record member payments
  version: 0.0.4

servers:
  - url: http://localhost:8080

tags:
  - name: Collectivities
  - name: Members
  - name: Mandates
  - name: Membership Fees
  - name: Payments
  - name: Transactions
  - name: Accounts
  - name: Activities
  - name: Attendances
  - name: Statistics
  - name: Federation

paths:

  /collectivities:
    get:
      tags: [Collectivities]
      summary: List collectivities
      operationId: listCollectivities
      parameters:
        - {name: location, in: query, schema: {type: string}}
        - {name: specialty, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PageCollectivity'}

    post:
      tags: [Collectivities]
      summary: Create a list of collectivities
      description: |
        Creates one or more collectivities. Member IDs are provided in the request;
        full member objects are returned in the response.
      operationId: createCollectivities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/CreateCollectivity'
      responses:
        '201':
          description: List of created collectivities
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/Collectivity'}
        '400':
          description: Missing federation approval or invalid structure.
        '404':
          description: Member not found.

  /collectivities/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Collectivities]
      summary: Get a collectivity
      operationId: getCollectivity
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Collectivities]
      summary: Update a collectivity
      operationId: updateCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateCollectivity'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/approval:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [Collectivities]
      summary: Grant or deny federation approval
      operationId: approveCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ApprovalRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  # v0.0.4 — replaces PATCH /collectivities/{id}/identity
  /collectivities/{id}/informations:
    parameters:
      - $ref: '#/components/parameters/id'
    put:
      tags: [Collectivities]
      summary: Assign a unique number and name to a collectivity
      description: |
        Reserved for the federation.
        - The name must be unique across all collectivities.
        - Once `number` or `name` is set, it **cannot** be changed (returns **409 Conflict**).
        - At least one of `number` or `name` must be provided.
      operationId: assignCollectivityInformations
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AssignIdentityRequest'}
      responses:
        '200':
          description: Identity assigned — returns the updated collectivity.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Collectivity'}
        '400':
          description: Request body is missing both number and name.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  # ── Membership Fees ──────────────────────────────────────────
  /collectivities/{id}/membershipFees:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Membership Fees]
      summary: List membership fees of a collectivity
      operationId: listMembershipFees
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/MembershipFeeType'}}
        - {name: status, in: query, schema: {type: string, enum: [ACTIVE, INACTIVE]}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PageMembershipFee'}
        '404': {$ref: '#/components/responses/NotFound'}

    post:
      tags: [Membership Fees]
      summary: Create a list of membership fees for a collectivity
      description: |
        Creates one or more periodic or one-time membership fees.
        Maps to the `membership_fee` table.
      operationId: createMembershipFees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/CreateMembershipFee'
      responses:
        '201':
          description: List of created membership fees
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/MembershipFee'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/membershipFees/{feeId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: feeId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Membership Fees]
      summary: Get a membership fee
      operationId: getMembershipFee
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/MembershipFee'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  # ── Transactions ──────────────────────────────────────────────
  /collectivities/{id}/transactions:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Transactions]
      summary: List collectivity transactions for a given period
      description: |
        Returns all `collectivity_transaction` records for the collectivity,
        filtered by date range. Both `startDate` and `endDate` are required.
      operationId: listCollectivityTransactions
      parameters:
        - {name: startDate, in: query, required: true, schema: {type: string, format: date}}
        - {name: endDate,   in: query, required: true, schema: {type: string, format: date}}
        - {name: accountCreditedId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PageCollectivityTransaction'}
        '400':
          description: Missing or invalid date range.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation/transactions:
    get:
      tags: [Federation]
      summary: List federation-level transactions
      operationId: listFederationTransactions
      parameters:
        - {name: startDate, in: query, required: true, schema: {type: string, format: date}}
        - {name: endDate,   in: query, required: true, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PageCollectivityTransaction'}

  # ── Members ───────────────────────────────────────────────────
  /members:
    post:
      tags: [Members]
      summary: Admit a list of new members
      description: |
        Admits one or more members. Each member must include at least one referee
        and at least one initial payment (maps to `member_payment`).
        `registrationFeePaid` and `membershipDuesPaid` booleans have been removed;
        real payment objects must be provided instead.
      operationId: createMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/CreateMember'
      responses:
        '201':
          description: List of admitted members
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/Member'}
        '400':
          description: |
            Bad request — possible causes:
            - Missing or invalid referees
            - No payment provided
            - Required payment not covered
        '404':
          description: Collectivity or referenced member not found.

  /collectivities/{id}/members:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Members]
      summary: List members of a collectivity
      operationId: listMembers
      parameters:
        - {name: occupation, in: query, schema: {$ref: '#/components/schemas/MemberOccupation'}}
        - {name: active, in: query, schema: {type: boolean}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageMember'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/members/{memberId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: memberId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Members]
      summary: Get a member
      operationId: getMember
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Member'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Members]
      summary: Resign a member
      operationId: resignMember
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ResignRequest'}
      responses:
        '204': {description: Resignation registered}
        '404': {$ref: '#/components/responses/NotFound'}

  /members/{memberId}/transfer:
    parameters:
      - {name: memberId, in: path, required: true, schema: {type: string}}
    post:
      tags: [Members]
      summary: Transfer a member to another collectivity
      operationId: transferMember
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TransferRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Member'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  # ── Member Payments ───────────────────────────────────────────
  /members/{id}/payments:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [Payments]
      summary: Record a list of payments made by a member
      description: |
        Records one or more `member_payment` entries for the given member.
        Each payment must reference a valid `membershipFeeId` and a target account.
      operationId: createMemberPayments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/CreateMemberPayment'
      responses:
        '201':
          description: List of recorded payments
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/MemberPayment'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

    get:
      tags: [Payments]
      summary: List payments made by a member
      operationId: listMemberPayments
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate,   in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PageMemberPayment'}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/payments:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Payments]
      summary: List all member payments received by a collectivity
      operationId: listCollectivityPayments
      parameters:
        - {name: memberId,  in: query, schema: {type: string}}
        - {name: feeId,     in: query, schema: {type: string}}
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate,   in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PageMemberPayment'}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/payments/{paymentId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: paymentId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Payments]
      summary: Get a specific member payment
      operationId: getMemberPayment
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/MemberPayment'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  # ── Mandates ──────────────────────────────────────────────────
  /collectivities/{id}/mandates:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Mandates]
      summary: List mandates of a collectivity
      operationId: listMandates
      parameters:
        - {name: year, in: query, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Mandate'}}}}}
    post:
      tags: [Mandates]
      summary: Create an annual mandate
      operationId: createMandate
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateMandate'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Mandate'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/mandates/{mandateId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: mandateId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Mandates]
      summary: Get a mandate
      operationId: getMandate
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Mandate'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  # ── Accounts ──────────────────────────────────────────────────
  /collectivities/{id}/accounts:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Accounts]
      summary: List accounts of a collectivity
      operationId: listAccountsCollectivity
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/AccountType'}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Account'}}}}}
    post:
      tags: [Accounts]
      summary: Create an account for a collectivity
      operationId: createAccountCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAccount'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: accountId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Accounts]
      summary: Get an account
      operationId: getAccountCollectivity
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    # NOTE: PUT /accounts/{id} (manual balance update) removed in v0.0.4.
    # Balance is now readOnly and computed from member_payment + collectivity_transaction.

  /collectivities/{id}/financialAccounts:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Accounts]
      summary: List financial accounts with computed balance at a given date
      operationId: listFinancialAccountsAtDate
      parameters:
        - {name: at, in: query, schema: {type: string, format: date}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/AccountBalance'}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation/accounts:
    get:
      tags: [Federation]
      summary: List federation accounts
      operationId: listAccountsFederation
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/AccountType'}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Account'}}}}}
    post:
      tags: [Federation]
      summary: Create a federation account
      operationId: createAccountFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAccount'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/accounts/{accountId}:
    parameters:
      - {name: accountId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Federation]
      summary: Get a federation account
      operationId: getAccountFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  # ── Activities ────────────────────────────────────────────────
  /collectivities/{id}/schedule:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Activities]
      summary: Get annual schedule
      operationId: getSchedule
      parameters:
        - {name: year, in: query, required: true, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Schedule'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Activities]
      summary: Define recurrence rules
      operationId: setSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateSchedule'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Schedule'}}}}

  /collectivities/{id}/activities:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Activities]
      summary: List activities of a collectivity
      operationId: listActivities
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/ActivityType'}}
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageActivity'}}}}
    post:
      tags: [Activities]
      summary: Plan an exceptional activity
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateActivity'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivities/{id}/activities/{activityId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: activityId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Activities]
      summary: Get an activity
      operationId: getActivity
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Activities]
      summary: Update an activity
      operationId: updateActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateActivity'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Activities]
      summary: Delete an activity
      operationId: deleteActivity
      responses:
        '204': {description: Deleted}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation/activities:
    get:
      tags: [Federation]
      summary: List federation activities
      operationId: listFederationActivities
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageActivity'}}}}
    post:
      tags: [Federation]
      summary: Plan a national activity
      operationId: createFederationActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateFederationActivity'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/activities/{activityId}:
    parameters:
      - {name: activityId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Federation]
      summary: Get a federation activity
      operationId: getFederationActivity
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Federation]
      summary: Update a federation activity
      operationId: updateFederationActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateFederationActivity'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activity'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Federation]
      summary: Delete a federation activity
      operationId: deleteFederationActivity
      responses:
        '204': {description: Deleted}
        '404': {$ref: '#/components/responses/NotFound'}

  # ── Attendances ───────────────────────────────────────────────
  /activities/{activityId}/attendances:
    parameters:
      - {name: activityId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Attendances]
      summary: Get attendance sheet of an activity
      operationId: listAttendances
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Attendance'}}}}}
    post:
      tags: [Attendances]
      summary: Record a member attendance
      operationId: recordAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAttendance'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Attendance'}}}}
        '409': {description: Attendance already recorded}

  /activities/{activityId}/attendances/{memberId}:
    parameters:
      - {name: activityId, in: path, required: true, schema: {type: string}}
      - {name: memberId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Attendances]
      summary: Get attendance of a member
      operationId: getAttendance
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Attendance'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Attendances]
      summary: Update attendance
      operationId: updateAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAttendance'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Attendance'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  # ── Statistics ────────────────────────────────────────────────
  /collectivities/{id}/statistics:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Statistics]
      summary: Monthly report (for the federation)
      operationId: getMonthlyReport
      parameters:
        - {name: month, in: query, required: true, schema: {type: integer, minimum: 1, maximum: 12}}
        - {name: year,  in: query, required: true, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/CollectivityStatistics'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/statistics/members:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Statistics]
      summary: Detailed statistics for all active members
      operationId: getMembersStatistics
      parameters:
        - {name: startDate, in: query, required: true, schema: {type: string, format: date}}
        - {name: endDate,   in: query, required: true, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageMemberStatistics'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivities/{id}/statistics/members/{memberId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: memberId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Statistics]
      summary: Statistics of a specific member
      operationId: getMemberStatistics
      parameters:
        - {name: startDate, in: query, required: true, schema: {type: string, format: date}}
        - {name: endDate,   in: query, required: true, schema: {type: string, format: date}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/MemberStatistics'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  # v0.0.4 — financial statistics
  /collectivities/{id}/statistics/financial:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Statistics]
      summary: Financial statistics (total payments, transfers, per account)
      operationId: getFinancialStatistics
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate,   in: query, schema: {type: string, format: date}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FinancialStatistics'}
        '404': {$ref: '#/components/responses/NotFound'}

  # ── Federation ────────────────────────────────────────────────
  /federation:
    get:
      tags: [Federation]
      summary: Get federation info
      operationId: getFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Federation'}}}}
    put:
      tags: [Federation]
      summary: Update federation settings
      operationId: updateFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateFederation'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Federation'}}}}

  /federation/mandates:
    get:
      tags: [Federation]
      summary: List federation mandates
      operationId: listFederationMandates
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/FederationMandate'}}}}}
    post:
      tags: [Federation]
      summary: Create a federation mandate (2 years)
      operationId: createFederationMandate
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateFederationMandate'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/FederationMandate'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/mandates/{mandateId}:
    parameters:
      - {name: mandateId, in: path, required: true, schema: {type: string}}
    get:
      tags: [Federation]
      summary: Get a federation mandate
      operationId: getFederationMandate
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/FederationMandate'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

# ══════════════════════════════════════════════════════════════════
# COMPONENTS
# ══════════════════════════════════════════════════════════════════
components:

  parameters:
    id:
      name: id
      in: path
      required: true
      schema: {type: string}
    page:
      name: page
      in: query
      schema: {type: integer, default: 1, minimum: 1}
    size:
      name: size
      in: query
      schema: {type: integer, default: 20, minimum: 1, maximum: 100}

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Conflict:
      description: |
        The number or name is already assigned and cannot be changed,
        or the name is already used by another collectivity.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}

  schemas:

    # ── Enums ──────────────────────────────────────────────────
    MemberOccupation:
      type: string
      enum: [PRESIDENT, VICE_PRESIDENT, TREASURER, SECRETARY, SENIOR, JUNIOR]

    Gender:
      type: string
      # Aligned with DB constraint: MALE / FEMALE (migration script updated gender check)
      enum: [MALE, FEMALE]

    AccountType:
      type: string
      enum: [CASH, BANK, MOBILE_MONEY]

    PaymentMethod:
      type: string
      # Aligned with DB migration: CASH, MOBILE_BANKING, BANK_TRANSFER, MOBILE_MONEY
      enum: [CASH, BANK_TRANSFER, MOBILE_MONEY, MOBILE_BANKING]

    ActivityType:
      type: string
      # Aligned with DB: GENERAL_MEETING (was GENERAL_ASSEMBLY in v0.0.3)
      enum: [GENERAL_MEETING, JUNIOR_TRAINING, EXCEPTIONAL, FEDERATION]

    AttendanceStatus:
      type: string
      enum: [PRESENT, ABSENT, EXCUSED]

    Bank:
      type: string
      enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]

    MobileMoneyService:
      type: string
      enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]

    # v0.0.4 — NEW: replaces ContributionType
    MembershipFeeType:
      type: string
      # Aligned with DB frequency constraint
      enum: [MONTHLY, ANNUALLY, WEEKLY, ONE_TIME, PUNCTUALLY]

    # ── Membership Fee (v0.0.4) ────────────────────────────────
    MembershipFee:
      type: object
      properties:
        id:
          type: string
        collectivityId:
          type: string
        label:
          type: string
        type:
          $ref: '#/components/schemas/MembershipFeeType'
        amount:
          type: number
          minimum: 0
        eligibleFrom:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    CreateMembershipFee:
      type: object
      required: [label, amount, type, eligibleFrom]
      properties:
        label:
          type: string
        amount:
          type: number
          minimum: 0
        type:
          $ref: '#/components/schemas/MembershipFeeType'
        eligibleFrom:
          type: string
          format: date
          description: Maps to membership_fee.eligible_from

    # ── Member Payment (v0.0.4 — replaces Contribution) ────────
    MemberPayment:
      type: object
      properties:
        id:
          type: string
        memberId:
          type: string
        membershipFeeId:
          type: string
          description: FK → membership_fee.id
        accountCreditedId:
          type: string
          description: FK → account.id (account credited on payment)
        amount:
          type: number
        paymentDate:
          type: string
          format: date
          description: Maps to member_payment.creation_date
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        transactionId:
          type: string
          description: External transaction reference (e.g. mobile money ID)

    CreateMemberPayment:
      type: object
      required: [membershipFeeId, amount, paymentMethod, accountCreditedId]
      properties:
        membershipFeeId:
          type: string
        accountCreditedId:
          type: string
        amount:
          type: number
          minimum: 0.01
        paymentDate:
          type: string
          format: date
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        transactionId:
          type: string

    # ── Collectivity Transaction (v0.0.4) ──────────────────────
    CollectivityTransaction:
      type: object
      properties:
        id:
          type: string
        collectivityId:
          type: string
        memberDebitedId:
          type: string
          description: FK → member.id (member who made the payment)
        accountCreditedId:
          type: string
          description: FK → account.id
        amount:
          type: number
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        transactionDate:
          type: string
          format: date
          description: Maps to collectivity_transaction.creation_date

    # ── Financial Statistics (v0.0.4) ──────────────────────────
    FinancialStatistics:
      type: object
      properties:
        totalPayments:
          type: number
          description: Total amount of all member payments
        totalTransferred:
          type: number
          description: Total amount transferred to federation
        totalByAccount:
          type: array
          items:
            type: object
            properties:
              accountId:
                type: string
              amount:
                type: number

    # ── Member ─────────────────────────────────────────────────
    MemberIdentifier:
      type: string

    MemberInformation:
      type: object
      properties:
        firstName:    {type: string}
        lastName:     {type: string}
        birthDate:    {type: string, format: date}
        gender:       {$ref: '#/components/schemas/Gender'}
        address:      {type: string}
        profession:   {type: string}
        phoneNumber:  {type: string}
        email:        {type: string, format: email}
        occupation:   {$ref: '#/components/schemas/MemberOccupation'}

    CreateMember:
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      type: object
      required: [collectivityIdentifier, referees, payments]
      properties:
        collectivityIdentifier:
          type: string
        referees:
          type: array
          minItems: 1
          items: {$ref: '#/components/schemas/MemberIdentifier'}
          description: At least one referee (maps to adhesion_referent table)
        # v0.0.4 — registrationFeePaid + membershipDuesPaid removed
        # Real payment objects required instead
        payments:
          type: array
          minItems: 1
          items: {$ref: '#/components/schemas/CreateMemberPayment'}
          description: Initial payments at admission (maps to member_payment)

    Member:
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      type: object
      properties:
        id:           {$ref: '#/components/schemas/MemberIdentifier'}
        collectivityId: {type: string}
        active:       {type: boolean}
        memberSince:  {type: string, format: date}
        referees:
          type: array
          items: {$ref: '#/components/schemas/Member'}

    ResignRequest:
      type: object
      required: [resignationDate]
      properties:
        resignationDate: {type: string, format: date}
        reason: {type: string}

    TransferRequest:
      type: object
      required: [targetCollectivityId, transferDate]
      properties:
        targetCollectivityId: {type: string}
        transferDate: {type: string, format: date}
        reason: {type: string}

    # ── Collectivity ───────────────────────────────────────────
    CreateCollectivityStructure:
      type: object
      properties:
        president:     {$ref: '#/components/schemas/MemberIdentifier'}
        vicePresident: {$ref: '#/components/schemas/MemberIdentifier'}
        treasurer:     {$ref: '#/components/schemas/MemberIdentifier'}
        secretary:     {$ref: '#/components/schemas/MemberIdentifier'}

    CollectivityStructure:
      type: object
      properties:
        president:     {$ref: '#/components/schemas/Member'}
        vicePresident: {$ref: '#/components/schemas/Member'}
        treasurer:     {$ref: '#/components/schemas/Member'}
        secretary:     {$ref: '#/components/schemas/Member'}

    CreateCollectivity:
      type: object
      required: [location, specialty, creationDate, structure, members]
      properties:
        location:          {type: string}
        specialty:         {type: string}
        creationDate:      {type: string, format: date}
        federationApproval: {type: boolean, default: false}
        structure:         {$ref: '#/components/schemas/CreateCollectivityStructure'}
        members:
          type: array
          minItems: 10
          items: {$ref: '#/components/schemas/MemberIdentifier'}

    Collectivity:
      type: object
      properties:
        id:                {type: string}
        number:            {type: string}
        name:              {type: string}
        location:          {type: string}
        specialty:         {type: string}
        creationDate:      {type: string, format: date}
        federationApproval: {type: boolean}
        structure:         {$ref: '#/components/schemas/CollectivityStructure'}
        members:
          type: array
          items: {$ref: '#/components/schemas/Member'}

    ApprovalRequest:
      type: object
      required: [approved]
      properties:
        approved: {type: boolean}
        comment:  {type: string}

    AssignIdentityRequest:
      type: object
      description: At least one of `number` or `name` must be provided. Immutable once set.
      properties:
        number:
          type: string
          description: Unique federation number (e.g. "COLL-042")
        name:
          type: string
          description: Unique federation name

    # ── Mandates ───────────────────────────────────────────────
    MemberOccupationRef:
      type: object
      required: [memberId, occupation]
      properties:
        memberId:   {type: string}
        occupation: {$ref: '#/components/schemas/MemberOccupation'}

    Mandate:
      type: object
      properties:
        id:             {type: string}
        collectivityId: {type: string}
        year:           {type: integer}
        startDate:      {type: string, format: date}
        endDate:        {type: string, format: date}
        occupations:
          type: array
          items: {$ref: '#/components/schemas/MemberOccupationRef'}

    CreateMandate:
      type: object
      required: [year, occupations]
      properties:
        year: {type: integer}
        occupations:
          type: array
          minItems: 4
          items: {$ref: '#/components/schemas/MemberOccupationRef'}

    FederationMandate:
      type: object
      properties:
        id:        {type: string}
        startDate: {type: string, format: date}
        endDate:   {type: string, format: date}
        occupations:
          type: array
          items: {$ref: '#/components/schemas/MemberOccupationRef'}

    CreateFederationMandate:
      type: object
      required: [startDate, occupations]
      properties:
        startDate: {type: string, format: date}
        occupations:
          type: array
          minItems: 4
          items: {$ref: '#/components/schemas/MemberOccupationRef'}

    # ── Accounts ───────────────────────────────────────────────
    Account:
      type: object
      properties:
        id:           {type: string}
        type:         {$ref: '#/components/schemas/AccountType'}
        # v0.0.4: balance is readOnly — computed from member_payment + collectivity_transaction
        balance:
          type: number
          readOnly: true
        balanceDate:
          type: string
          format: date
          readOnly: true
        currency:     {type: string, default: MGA}
        holder:       {type: string}
        bank:         {$ref: '#/components/schemas/Bank'}
        accountNumber: {type: string, pattern: '^\d{23}$'}
        mobileMoneyService: {$ref: '#/components/schemas/MobileMoneyService'}
        phoneNumber:  {type: string}

    CreateAccount:
      type: object
      required: [type]
      properties:
        type:           {$ref: '#/components/schemas/AccountType'}
        initialBalance: {type: number, default: 0}
        holder:         {type: string}
        bank:           {$ref: '#/components/schemas/Bank'}
        accountNumber:  {type: string, pattern: '^\d{23}$'}
        mobileMoneyService: {$ref: '#/components/schemas/MobileMoneyService'}
        phoneNumber:    {type: string}

    AccountBalance:
      type: object
      properties:
        accountId:   {type: string}
        type:        {$ref: '#/components/schemas/AccountType'}
        balance:     {type: number, readOnly: true}
        balanceDate: {type: string, format: date}

    # ── Activities ─────────────────────────────────────────────
    Activity:
      type: object
      properties:
        id:             {type: string}
        collectivityId: {type: string, nullable: true}
        type:           {$ref: '#/components/schemas/ActivityType'}
        title:          {type: string}
        description:    {type: string}
        date:           {type: string, format: date-time}
        mandatory:      {type: boolean}
        targetOccupations:
          type: array
          items: {$ref: '#/components/schemas/MemberOccupation'}

    CreateActivity:
      type: object
      required: [title, date, mandatory]
      properties:
        title:       {type: string}
        description: {type: string}
        date:        {type: string, format: date-time}
        mandatory:   {type: boolean}
        targetOccupations:
          type: array
          items: {$ref: '#/components/schemas/MemberOccupation'}

    CreateFederationActivity:
      type: object
      required: [title, date, mandatory]
      properties:
        title:       {type: string}
        description: {type: string}
        date:        {type: string, format: date-time}
        mandatory:   {type: boolean}
        invitedCollectivityIds:
          type: array
          items: {type: string}

    Schedule:
      type: object
      properties:
        collectivityId:        {type: string}
        year:                  {type: integer}
        generalAssemblyRule:   {type: string}
        juniorTrainingRule:    {type: string}
        generalAssemblyDates:
          type: array
          readOnly: true
          items: {type: string, format: date}
        juniorTrainingDates:
          type: array
          readOnly: true
          items: {type: string, format: date}

    CreateSchedule:
      type: object
      required: [year, generalAssemblyRule, juniorTrainingRule]
      properties:
        year:                {type: integer}
        generalAssemblyRule: {type: string}
        juniorTrainingRule:  {type: string}

    # ── Attendances ────────────────────────────────────────────
    Attendance:
      type: object
      properties:
        activityId:    {type: string}
        memberId:      {type: string}
        status:        {$ref: '#/components/schemas/AttendanceStatus'}
        isVisitor:     {type: boolean, default: false}
        absenceReason: {type: string, nullable: true}

    CreateAttendance:
      type: object
      required: [memberId, status]
      properties:
        memberId:      {type: string}
        status:        {$ref: '#/components/schemas/AttendanceStatus'}
        absenceReason: {type: string}

    # ── Statistics ─────────────────────────────────────────────
    CollectivityStatistics:
      type: object
      properties:
        collectivityId:       {type: string}
        month:                {type: integer}
        year:                 {type: integer}
        attendanceRatePercent: {type: number}
        activeMembers:        {type: integer}
        activitiesHeld:       {type: integer}

    MemberStatistics:
      type: object
      properties:
        memberId:              {type: string}
        startDate:             {type: string, format: date}
        endDate:               {type: string, format: date}
        attendanceRatePercent: {type: number}
        totalPaidMGA:          {type: number}
        totalUnpaidMGA:        {type: number}

    # ── Federation ─────────────────────────────────────────────
    Federation:
      type: object
      properties:
        id:   {type: string}
        name: {type: string}
        # DB: reverse_contribution_percentage
        contributionForwardingPercent: {type: number}

    UpdateFederation:
      type: object
      required: [contributionForwardingPercent]
      properties:
        contributionForwardingPercent:
          type: number
          minimum: 0
          maximum: 100

    # ── Shared ─────────────────────────────────────────────────
    Error:
      type: object
      properties:
        code:    {type: string}
        message: {type: string}

    Page:
      type: object
      properties:
        page:          {type: integer}
        size:          {type: integer}
        totalElements: {type: integer}
        totalPages:    {type: integer}

    PageCollectivity:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/Collectivity'}}

    PageMember:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/Member'}}

    # v0.0.4 — PageContribution removed, replaced by PageMemberPayment
    PageMemberPayment:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/MemberPayment'}}

    PageMembershipFee:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/MembershipFee'}}

    PageCollectivityTransaction:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/CollectivityTransaction'}}

    PageActivity:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/Activity'}}

    PageMemberStatistics:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content: {type: array, items: {$ref: '#/components/schemas/MemberStatistics'}}