openapi: 3.0.3
info:
  title: Fédération de Collectivités Agricoles
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Collectivités
  - name: Membres
  - name: Mandats
  - name: Cotisations
  - name: Comptes
  - name: Activités
  - name: Présences
  - name: Statistiques
  - name: Fédération

paths:

  /collectivites:
    get:
      tags: [Collectivités]
      summary: Lister les collectivités
      operationId: listCollectivites
      parameters:
        - {name: ville, in: query, schema: {type: string}}
        - {name: specialite, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageCollectivite'}}}}

    post:
      tags: [Collectivités]
      summary: Créer une collectivité
      operationId: createCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CollectiviteRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivite'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivites/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Collectivités]
      summary: Obtenir une collectivité
      operationId: getCollectivite
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivite'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Collectivités]
      summary: Modifier une collectivité
      operationId: updateCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CollectiviteRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivite'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivites/{id}/autorisation:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [Collectivités]
      summary: Accorder ou refuser l'ouverture
      operationId: autoriserCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AutorisationRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Collectivite'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivites/{id}/membres:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Membres]
      summary: Lister les membres d'une collectivité
      operationId: listMembres
      parameters:
        - {name: poste, in: query, schema: {$ref: '#/components/schemas/Poste'}}
        - {name: actif, in: query, schema: {type: boolean}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageMembre'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    post:
      tags: [Membres]
      summary: Admettre un membre
      operationId: admettreMembreCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AdmissionRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Membre'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivites/{id}/membres/{membreId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: membreId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Membres]
      summary: Obtenir un membre
      operationId: getMembre
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Membre'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Membres]
      summary: Démissionner un membre
      operationId: demissionnerMembre
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/DemissionRequest'}
      responses:
        '204': {description: Démission enregistrée}
        '404': {$ref: '#/components/responses/NotFound'}

  /membres/{membreId}/transfert:
    parameters:
      - {name: membreId, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      tags: [Membres]
      summary: Transférer un membre vers une autre collectivité
      operationId: transfererMembre
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TransfertRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Membre'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivites/{id}/mandats:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Mandats]
      summary: Lister les mandats d'une collectivité
      operationId: listMandats
      parameters:
        - {name: annee, in: query, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Mandat'}}}}}
    post:
      tags: [Mandats]
      summary: Créer un mandat annuel
      operationId: createMandat
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/MandatRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Mandat'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivites/{id}/mandats/{mandatId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: mandatId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Mandats]
      summary: Obtenir un mandat
      operationId: getMandat
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Mandat'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivites/{id}/cotisations:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Cotisations]
      summary: Lister les cotisations
      operationId: listCotisations
      parameters:
        - {name: membreId, in: query, schema: {type: string, format: uuid}}
        - {name: type, in: query, schema: {$ref: '#/components/schemas/TypeCotisation'}}
        - {name: dateDebut, in: query, schema: {type: string, format: date}}
        - {name: dateFin, in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageCotisation'}}}}
    post:
      tags: [Cotisations]
      summary: Enregistrer un encaissement
      operationId: enregistrerCotisation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CotisationRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Cotisation'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivites/{id}/cotisations/{cotisationId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: cotisationId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Cotisations]
      summary: Obtenir une cotisation
      operationId: getCotisation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Cotisation'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivites/{id}/comptes:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Comptes]
      summary: Lister les comptes d'une collectivité
      operationId: listComptesCollectivite
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/TypeCompte'}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Compte'}}}}}
    post:
      tags: [Comptes]
      summary: Créer un compte
      operationId: createCompteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CompteRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Compte'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivites/{id}/comptes/{compteId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: compteId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Comptes]
      summary: Obtenir un compte
      operationId: getCompteCollectivite
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Compte'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Comptes]
      summary: Mettre à jour le solde
      operationId: updateCompteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CompteUpdateRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Compte'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation/comptes:
    get:
      tags: [Fédération]
      summary: Lister les comptes de la fédération
      operationId: listComptesFederation
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/TypeCompte'}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Compte'}}}}}
    post:
      tags: [Fédération]
      summary: Créer un compte de la fédération
      operationId: createCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CompteRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Compte'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/comptes/{compteId}:
    parameters:
      - {name: compteId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Fédération]
      summary: Obtenir un compte de la fédération
      operationId: getCompteFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Compte'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Fédération]
      summary: Mettre à jour le solde
      operationId: updateCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CompteUpdateRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Compte'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivites/{id}/calendrier:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Activités]
      summary: Obtenir le calendrier annuel
      operationId: getCalendrier
      parameters:
        - {name: annee, in: query, required: true, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Calendrier'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Activités]
      summary: Définir les règles de récurrence
      operationId: setCalendrier
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CalendrierRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Calendrier'}}}}

  /collectivites/{id}/activites:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Activités]
      summary: Lister les activités d'une collectivité
      operationId: listActivites
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/TypeActivite'}}
        - {name: dateDebut, in: query, schema: {type: string, format: date}}
        - {name: dateFin, in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageActivite'}}}}
    post:
      tags: [Activités]
      summary: Planifier une activité exceptionnelle
      operationId: createActivite
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ActiviteRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Activite'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /collectivites/{id}/activites/{activiteId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: activiteId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Activités]
      summary: Obtenir une activité
      operationId: getActivite
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activite'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Activités]
      summary: Modifier une activité
      operationId: updateActivite
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ActiviteRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activite'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Activités]
      summary: Supprimer une activité
      operationId: deleteActivite
      responses:
        '204': {description: Supprimé}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation/activites:
    get:
      tags: [Fédération]
      summary: Lister les activités de la fédération
      operationId: listActivitesFederation
      parameters:
        - {name: dateDebut, in: query, schema: {type: string, format: date}}
        - {name: dateFin, in: query, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageActivite'}}}}
    post:
      tags: [Fédération]
      summary: Planifier une activité nationale
      operationId: createActiviteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ActiviteFederationRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Activite'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/activites/{activiteId}:
    parameters:
      - {name: activiteId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Fédération]
      summary: Obtenir une activité de la fédération
      operationId: getActiviteFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activite'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Fédération]
      summary: Modifier une activité de la fédération
      operationId: updateActiviteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ActiviteFederationRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Activite'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Fédération]
      summary: Supprimer une activité de la fédération
      operationId: deleteActiviteFederation
      responses:
        '204': {description: Supprimé}
        '404': {$ref: '#/components/responses/NotFound'}

  /activites/{activiteId}/presences:
    parameters:
      - {name: activiteId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Présences]
      summary: Fiche de présence d'une activité
      operationId: listPresences
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Presence'}}}}}
    post:
      tags: [Présences]
      summary: Enregistrer une présence
      operationId: enregistrerPresence
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PresenceRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/Presence'}}}}
        '409': {description: Présence déjà enregistrée}

  /activites/{activiteId}/presences/{membreId}:
    parameters:
      - {name: activiteId, in: path, required: true, schema: {type: string, format: uuid}}
      - {name: membreId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Présences]
      summary: Obtenir la présence d'un membre
      operationId: getPresence
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Presence'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Présences]
      summary: Mettre à jour une présence
      operationId: updatePresence
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PresenceRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Presence'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivites/{id}/statistiques:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Statistiques]
      summary: Rapport mensuel global
      operationId: getRapportMensuel
      parameters:
        - {name: mois, in: query, required: true, schema: {type: integer, minimum: 1, maximum: 12}}
        - {name: annee, in: query, required: true, schema: {type: integer}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/StatistiquesCollectivite'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivites/{id}/statistiques/membres:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Statistiques]
      summary: Statistiques de tous les membres actifs
      operationId: getStatistiquesMembres
      parameters:
        - {name: dateDebut, in: query, required: true, schema: {type: string, format: date}}
        - {name: dateFin, in: query, required: true, schema: {type: string, format: date}}
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/PageStatMembre'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /collectivites/{id}/statistiques/membres/{membreId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - {name: membreId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Statistiques]
      summary: Statistiques d'un membre spécifique
      operationId: getStatistiquesMembre
      parameters:
        - {name: dateDebut, in: query, required: true, schema: {type: string, format: date}}
        - {name: dateFin, in: query, required: true, schema: {type: string, format: date}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/StatMembre'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

  /federation:
    get:
      tags: [Fédération]
      summary: Obtenir les infos de la fédération
      operationId: getFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Federation'}}}}
    put:
      tags: [Fédération]
      summary: Mettre à jour les paramètres
      operationId: updateFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/FederationRequest'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Federation'}}}}

  /federation/mandats:
    get:
      tags: [Fédération]
      summary: Lister les mandats de la fédération
      operationId: listMandatsFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/MandatFederation'}}}}}
    post:
      tags: [Fédération]
      summary: Créer un mandat de la fédération
      operationId: createMandatFederation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/MandatFederationRequest'}
      responses:
        '201': {description: Créé, content: {application/json: {schema: {$ref: '#/components/schemas/MandatFederation'}}}}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  /federation/mandats/{mandatId}:
    parameters:
      - {name: mandatId, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      tags: [Fédération]
      summary: Obtenir un mandat de la fédération
      operationId: getMandatFederation
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/MandatFederation'}}}}
        '404': {$ref: '#/components/responses/NotFound'}

components:

  parameters:
    id:
      name: id
      in: path
      required: true
      schema: {type: string, format: uuid}
    page:
      name: page
      in: query
      schema: {type: integer, default: 1, minimum: 1}
    size:
      name: size
      in: query
      schema: {type: integer, default: 20, minimum: 1, maximum: 100}

  responses:
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Erreur'}
    UnprocessableEntity:
      description: Condition métier non respectée
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Erreur'}

  schemas:

    Poste:
      type: string
      enum: [PRESIDENT, PRESIDENT_ADJOINT, TRESORIER, SECRETAIRE, MEMBRE_CONFIRME, MEMBRE_JUNIOR]

    Genre:
      type: string
      enum: [MASCULIN, FEMININ]

    TypeCompte:
      type: string
      enum: [CAISSE, BANCAIRE, MOBILE_MONEY]

    TypeCotisation:
      type: string
      enum: [MENSUELLE, ANNUELLE, PONCTUELLE]

    ModePaiement:
      type: string
      enum: [ESPECE, VIREMENT_BANCAIRE, MOBILE_MONEY]

    TypeActivite:
      type: string
      enum: [ASSEMBLEE_GENERALE, FORMATION_JUNIORS, EXCEPTIONNELLE, FEDERATION]

    StatutPresence:
      type: string
      enum: [PRESENT, ABSENT, EXCUSE]

    Banque:
      type: string
      enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]

    ServiceMobileMoney:
      type: string
      enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]

    Collectivite:
      type: object
      properties:
        id: {type: string, format: uuid, readOnly: true}
        numero: {type: string}
